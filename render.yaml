# Updated deployment config
services:
  - type: web
    name: mat-textile-hub-admin
    env: node
    plan: free
    buildCommand: npm install && cd admin && npm install && npm run build && cd .. && mkdir -p backend/admin-dist && cp -r admin/dist/* backend/admin-dist/ && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://mat-textile-hub-admin.onrender.com
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_FROM_NAME
        value: MAT Traders
